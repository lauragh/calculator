<div>
  <section class="wrapper">
    <div class="numbers firstCol">
      <button (click)="getNumber(7)" class="num">7</button>
      <button (click)="getNumber(8)" class="num">8</button>
      <button (click)="getNumber(9)" class="num">9</button>
      <button (click)="getNumber(4)" class="num">4</button>
      <button (click)="getNumber(5)" class="num">5</button>
      <button (click)="getNumber(6)" class="num">6</button>
      <button (click)="getNumber(1)" class="num">1</button>
      <button (click)="getNumber(2)" class="num">2</button>
      <button (click)="getNumber(3)" class="num">3</button>
      <button (click)="getNumber(0)" style="grid-column: 2" class="num">0</button>
      <button (click)="getOperator('=')" style="grid-column: 3" class="op">=</button>

    </div>
    <div class="operators">
      <button (click)="getOperator('del')" class="op">CE</button>
      <button (click)="getOperator('/')" class="op">/</button>
      <button (click)="getOperator('*')" class="op">*</button>
      <button (click)="getOperator('-')" class="op">-</button>
      <button (click)="getOperator('+')" class="op">+</button>
    </div>

  </section>
  <h2 id="opSection">{{operation}}</h2>

</div>
